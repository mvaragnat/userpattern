require:
  - rubocop-rspec

AllCops:
  TargetRubyVersion: 3.0
  NewCops: enable
  SuggestExtensions: false
  Exclude:
    - "spec/dummy/**/*"
    - "vendor/**/*"
    - "bin/**/*"

Style/Documentation:
  Enabled: false

Metrics/BlockLength:
  Exclude:
    - "spec/**/*"
    - "*.gemspec"

Layout/LineLength:
  Max: 120

Metrics/MethodLength:
  Max: 15

Style/OneClassPerFile:
  Exclude:
    - 'spec/**/*'

RSpec/MultipleExpectations:
  Max: 4

RSpec/ExampleLength:
  Max: 12
